<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORM — Minimal Streetwear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDEDE8;
    --ink: #1A1A1A;
    --grey: #8A8A82;
    --accent: #FF4500;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* NAV */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px;
    border-bottom: 1px solid var(--ink);
  }
  .logo {
    font-family: Candara, 'Segoe UI', sans-serif;
    font-weight: 300;
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .nav-links a {
    color: var(--ink);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-links a:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }

  /* HERO */
  .hero {
    padding: 80px 32px 100px;
    border-bottom: 1px solid var(--ink);
    position: relative;
    overflow: hidden;
  }
  .hero h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(3rem, 12vw, 9rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }
  .hero h1 span { color: var(--accent); }
  .hero-sub {
    margin-top: 24px;
    max-width: 480px;
    font-size: 1.1rem;
    color: var(--grey);
  }
  .hero-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 60px;
    flex-wrap: wrap;
    gap: 24px;
  }
  .cta {
    display: inline-block;
    background: var(--ink);
    color: var(--bg);
    padding: 16px 32px;
    text-decoration: none;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
    transition: background 0.2s, color 0.2s;
  }
  .cta:hover { background: var(--accent); color: var(--white); }
  .cta:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

  .cta-logo-font {
    font-family: Candara, 'Segoe UI', sans-serif;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* TAG — signature element */
  .care-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    border: 1px solid var(--ink);
    padding: 16px;
    max-width: 220px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transform: rotate(2deg);
    background: var(--white);
  }
  .care-tag .row {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dashed var(--grey);
    padding: 4px 0;
  }
  .care-tag .row:last-child { border-bottom: none; }
  .care-tag .label { color: var(--grey); }

  /* PRODUCTS */
  .products {
    padding: 80px 32px;
    border-bottom: 1px solid var(--ink);
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .section-head h2 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  .section-head .tag-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--grey);
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--ink);
    border: 1px solid var(--ink);
  }
  .product {
    background: var(--bg);
    padding: 32px 24px;
    transition: background 0.25s;
  }
  .product:hover { background: var(--white); }
  .product-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    margin-bottom: 60px;
    display: block;
  }
  .product-img {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #d8d8d2, #c4c4bc);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .product-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(26,26,26,0.03) 10px, rgba(26,26,26,0.03) 20px);
  }

  .product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .product h3 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .product .price {
    font-family: 'JetBrains Mono', monospace;
    color: var(--grey);
    font-size: 0.9rem;
  }

  .buy-btn {
    display: block;
    margin-top: 16px;
    text-align: center;
    background: var(--ink);
    color: var(--bg);
    padding: 12px;
    text-decoration: none;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
    transition: background 0.2s, color 0.2s;
  }
  .buy-btn:hover { background: var(--accent); color: var(--white); }
  .buy-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

  .payment-icons {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .payment-icons img {
    height: 24px;
    width: auto;
    filter: grayscale(100%);
    opacity: 0.7;
  }

  /* MANIFESTO */
  .manifesto {
    padding: 100px 32px;
    border-bottom: 1px solid var(--ink);
    text-align: center;
  }
  .manifesto p {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2.75rem);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    max-width: 900px;
    margin: 0 auto;
    line-height: 1.3;
  }
  .manifesto p span { color: var(--accent); }

  /* FOOTER */
  footer {
    padding: 48px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 0.85rem;
  }
  .footer-links {
    display: flex;
    gap: 24px;
    list-style: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.8rem;
  }
  .footer-links a {
    color: var(--ink);
    text-decoration: none;
  }
  .footer-links a:hover { color: var(--accent); }
  .footer-links a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .footer-mono {
    font-family: 'JetBrains Mono', monospace;
    color: var(--grey);
    font-size: 0.75rem;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    nav { flex-direction: column; gap: 16px; align-items: flex-start; }
    .grid { grid-template-columns: 1fr; }
    .hero-meta { flex-direction: column; align-items: flex-start; }
    .care-tag { transform: rotate(0deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">VANGELICO</div>
  <ul class="nav-links">
    <li><a href="#shop">Shop</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="container">
    <div class="hero-meta">
      <a href="#shop" class="cta cta-logo-font">Shop</a>
    </div>
  </div>
</section>

<section class="products" id="shop">
  <div class="container">
    <div class="grid">
      <div class="product">
        <div class="product-img"><img src="images/product1.jpg" alt="Product 1"></div>
        <a href="https://buy.stripe.com/REPLACE_LINK_1" class="buy-btn">Buy now</a>
      </div>
      <div class="product">
        <div class="product-img"><img src="images/product2.jpg" alt="Product 2"></div>
        <a href="https://buy.stripe.com/REPLACE_LINK_2" class="buy-btn">Buy now</a>
      </div>
      <div class="product">
        <div class="product-img"><img src="images/product3.jpg" alt="Product 3"></div>
        <a href="https://buy.stripe.com/REPLACE_LINK_3" class="buy-btn">Buy now</a>
      </div>
    </div>
  </div>
</section>

<footer id="contact">
  <div class="payment-icons">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Apple_Pay_logo.svg" alt="Apple Pay">
  </div>
  <ul class="footer-links">
    <li><a href="mailto:vangelicoclothes@gmail.com">Support: text vangelicoclothes@gmail.com</a></li>
    <li><a href="#">Instagram</a></li>
    <li><a href="#">TikTok</a></li>
  </ul>
</footer>

</body>
</html>
